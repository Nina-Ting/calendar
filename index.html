<!DOCTYPE html>

<html lang="zh-TW">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>柳柳行事曆 ☁️</title>

<style>
body { font-family: "Microsoft JhengHei"; margin: 0; padding: 10px; background: #fdf6f7; }
h2 { text-align: center; color: #d63384; }
.header { display:flex; justify-content:space-between; align-items:center; }
button { padding:8px 15px; border:none; background:#ff85a2; color:white; border-radius:20px; }
.calendar { display:grid; grid-template-columns: repeat(7,1fr); gap:8px; }
.day { background:white; min-height:90px; padding:5px; border-radius:8px; cursor:pointer; }
.date { font-size:12px; color:#888; }
.event { font-size:13px; background:#ffe4ec; margin-top:3px; padding:2px 4px; border-left:3px solid #ff85a2; }
</style>

</head>

<body>

<h2>🌸 柳柳行事曆（雲端版）</h2>

<div class="header">
<button onclick="prevMonth()">⬅</button>
<div id="title"></div>
<button onclick="nextMonth()">➡</button>
</div>

<div class="calendar" id="cal"></div>

<!-- Firebase -->

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";


// 
const firebaseConfig = {
  apiKey: "AIzaSyCATMFkwvvBIqnqnKd2-5ArI6A86P_8q50",
  authDomain: "ting-calender.firebaseapp.com",
  projectId: "ting-calender",
  storageBucket: "ting-calender.firebasestorage.app",
  messagingSenderId: "899802615147",
  appId: "1:899802615147:web:98ee6a79006f3e75ce502e",
  measurementId: "G-Z16N89DKBG"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);


// =====================

let y = new Date().getFullYear();
let m = new Date().getMonth();

function key(y,m,d){ return `${y}-${m+1}-${d}`; }


// 🔥 讀資料
async function load(){
  const snap = await getDocs(collection(db, "events"));
  let data = {};
  snap.forEach(docu => {
    let item = docu.data();
    if(!data[item.date]) data[item.date] = [];
    data[item.date].push({ ...item, id: docu.id });
  });
  return data;
}


// 🎨 畫畫面
async function render(){
  const cal = document.getElementById("cal");
  cal.innerHTML = "";

  document.getElementById("title").innerText = `${y} / ${m+1}`;

  let data = await load();

  let first = new Date(y, m, 1);
  let start = (first.getDay()+6)%7;
  let days = new Date(y, m+1, 0).getDate();

  for(let i=0;i<start;i++) cal.appendChild(document.createElement("div"));

  for(let i=1;i<=days;i++){
    let box = document.createElement("div");
    box.className = "day";
    let k = key(y,m,i);

    let d = document.createElement("div");
    d.className = "date";
    d.innerText = i;
    box.appendChild(d);

    (data[k]||[]).forEach(item=>{
      let e = document.createElement("div");
      e.className="event";
      e.innerText=item.text;

      e.onclick = async (ev)=>{
        ev.stopPropagation();
        let val = prompt("修改（留空=刪除）", item.text);

        if(val===null) return;

        if(val.trim()===""){
          await deleteDoc(doc(db,"events",item.id));
        }else{
          await updateDoc(doc(db,"events",item.id),{text:val});
        }
        render();
      };

      box.appendChild(e);
    });

    box.onclick = async ()=>{
      let text = prompt("新增行程：");
      if(!text) return;

      await addDoc(collection(db,"events"),{
        date:k,
        text:text
      });

      render();
    };

    cal.appendChild(box);
  }
}


// 月份切換
function prevMonth(){ m--; if(m<0){m=11;y--;} render(); }
function nextMonth(){ m++; if(m>11){m=0;y++;} render(); }

window.onload = render;

</script>

</body>
</html>
